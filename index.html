<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Săn Mã Shopee - Giá Tốt Mỗi Ngày</title>
    <style>
        :root {
            --primary-color: #ee4d2d;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
            --accent: #a5d6a7; /* Màu xanh lá nhạt giống hình mẫu */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .btn-main {
            background: var(--text-main);
            color: white;
        }

        .btn-main:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: var(--accent);
            color: #2e4a2e;
            display: none; /* Chỉ hiện khi có link */
        }

        .result-box {
            margin: 20px 0;
            padding: 15px;
            background: #f1f8e9;
            border-radius: 10px;
            display: none;
            border: 1px dashed var(--accent);
        }

        .result-box a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
        }

        /* Responsive cho Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Candee Affiliate</h2>
    <p class="subtitle">Dán link Shopee để nhận ưu đãi đặc biệt</p>

    <div class="input-group">
        <input id="link" type="text" placeholder="https://shopee.vn/product/...">
    </div>

    <div class="result-box" id="resultContainer">
        <div id="result"></div>
    </div>

    <div class="button-stack">
        <button class="btn-main" onclick="convert()">TẠO LINK NGAY</button>
        <button id="copyBtn" class="btn-copy" onclick="copyLink()">SAO CHÉP LINK</button>
    </div>
</div>

<script>
    let finalLink = "";

    function convert() {
        let input = document.getElementById("link").value.trim();
        if (!input) {
            alert("Vui lòng dán link Shopee!");
            return;
        }

        // Logic Affiliate
        let aff = "mmp_pid=an_17180360000&utm_source=an_17180360000&utm_medium=affiliates";
        let match = input.match(/i\.(\d+)\.(\d+)/);

        if (match) {
            finalLink = `https://shopee.vn/product/${match[1]}/${match[2]}?${aff}`;
        } else {
            finalLink = input.includes("?") ? `${input}&${aff}` : `${input}?${aff}`;
        }

        // Cập nhật giao diện
        document.getElementById("resultContainer").style.display = "block";
        document.getElementById("copyBtn").style.display = "block";
        document.getElementById("result").innerHTML = 
            `<a href="${finalLink}" target="_blank">👉 Click để đến trang sản phẩm</a>`;
    }

    function copyLink() {
        if (!finalLink) return;
        navigator.clipboard.writeText(finalLink);
        
        let btn = document.getElementById("copyBtn");
        btn.innerText = "ĐÃ SAO CHÉP!";
        setTimeout(() => { btn.innerText = "SAO CHÉP LINK"; }, 2000);
    }
</script>

</body>
</html>
