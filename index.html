<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Săn mã Shopee - Vitimex</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
  color: #ee4d2d;
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #ee4d2d;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
}

.copy {
  background: #333;
}

.result {
  margin-top: 15px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔥 SĂN MÃ SHOPEE</h2>
  <p>Tool riêng Vitimex - Dán link để nhận giá tốt</p>

  <input id="link" placeholder="Dán link Shopee vào đây">

  <br>
  <button onclick="convert()">Tạo link</button>

  <div class="result" id="result"></div>

  <button class="copy" onclick="copyLink()">Copy link</button>
</div>

<script>
let finalLink = "";

function convert(){
  let input = document.getElementById("link").value.trim();

  if(!input){
    alert("Dán link trước nha!");
    return;
  }

  // 👉 Affiliate của bạn
  let aff = "mmp_pid=an_17180360000&utm_source=an_17180360000&utm_medium=affiliates";

  // 👉 Kiểm tra link sản phẩm
  let match = input.match(/i\.(\d+)\.(\d+)/);

  if(match){
    let shopid = match[1];
    let itemid = match[2];

    let base = `https://shopee.vn/product/${shopid}/${itemid}`;
    finalLink = base + "?" + aff;
  } else {
    // 👉 Link khác vẫn cho qua (flash sale, danh mục...)
    if(input.includes("?")){
      finalLink = input + "&" + aff;
    } else {
      finalLink = input + "?" + aff;
    }
  }

  document.getElementById("result").innerHTML =
    `<a href="${finalLink}" target="_blank">👉 Bấm vào đây để mua giá tốt</a>`;
}

function copyLink(){
  if(!finalLink){
    alert("Chưa có link!");
    return;
  }
  navigator.clipboard.writeText(finalLink);
  alert("Đã copy link!");
}
</script>

</body>
</html>
